<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./CSS/Style.css">
</head>
<body>

   <center> <h1>Contact Us</h1></center>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="enquiry.html">Enquiry</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="contact-container">
        <div class="contact-wrapper">

            <div class="side-details">
                <h2>Send Message</h2>
                <p class="side-desc"></p>

                <div class="info-links">
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="info-text">
                            <h4>Our Location</h4>
                            <p>Walmer Park Shopping Center</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="info-text">
                            <h4>Call Us</h4>
                            <p>067-346-7890</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-envelope"></i></div>
                        <div class="info-text">
                            <h4>Email Us</h4>
                            <p>ApheLux@gmail.com</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-container">
                <h2>Send Message</h2>

                <form id="contactForm">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" required placeholder="Your Name">
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Your Email">
                    </div>

                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="4" required placeholder="Your Message..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div> 

            <div class="map-container-panel">
                <iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2873.719813291583!2d-93.2642106!3d44.0684617!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87f6db06f3621fc7%3A0xc3b84ca25514eeef!2sSugar%20Camp%20Rd%2C%20Minnesota!5e0!3m2!1sen!2sus!4v1710000000000!5m2!1sen!2sus"

                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

        </div>
    </div>

    <footer>
        <p>© 2026 ApheLux | All Rights Reserved</p>
    </footer>

</body>
</html>
